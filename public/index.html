<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CashCloud - Multi-User Payment Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .header {
            text-align: center;
            padding: 40px 0;
            color: white;
        }
        
        .header h1 {
            font-size: 3rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }
        
        .header p {
            font-size: 1.2rem;
            opacity: 0.9;
        }
        
        .payment-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            margin-top: 40px;
        }
        
        .payment-card {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            transition: transform 0.3s ease;
        }
        
        .payment-card:hover {
            transform: translateY(-5px);
        }
        
        .payment-card h2 {
            color: #4a5568;
            margin-bottom: 20px;
            font-size: 1.5rem;
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 10px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #4a5568;
            font-weight: 500;
        }
        
        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.3s ease;
        }
        
        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            width: 100%;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        
        .btn:active {
            transform: translateY(0);
        }
        
        .transaction-table {
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin-top: 40px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        
        .transaction-table h2 {
            color: #4a5568;
            margin-bottom: 20px;
            font-size: 1.5rem;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        th {
            background: #f7fafc;
            color: #4a5568;
            font-weight: 600;
            padding: 12px;
            text-align: left;
            border-bottom: 2px solid #e2e8f0;
        }
        
        td {
            padding: 12px;
            border-bottom: 1px solid #e2e8f0;
            color: #4a5568;
        }
        
        tr:hover {
            background: #f7fafc;
        }
        
        .status-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.875rem;
            font-weight: 600;
            display: inline-block;
        }
        
        .status-success {
            background: #c6f6d5;
            color: #22543d;
        }
        
        .status-pending {
            background: #feebc8;
            color: #744210;
        }
        
        .status-failed {
            background: #fed7d7;
            color: #742a2a;
        }
        
        .qr-section {
            text-align: center;
            margin-top: 20px;
            padding: 20px;
            background: #f7fafc;
            border-radius: 8px;
            display: none;
        }
        
        .qr-section.show {
            display: block;
        }
        
        .qr-code {
            margin: 20px auto;
            width: 200px;
            height: 200px;
            background: #e2e8f0;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
        }
        
        .payment-link {
            word-break: break-all;
            color: #667eea;
            text-decoration: none;
        }
        
        .payment-link:hover {
            text-decoration: underline;
        }
        
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .error-message {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #f56565;
            color: white;
            padding: 15px 25px;
            border-radius: 8px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
            z-index: 9999;
            animation: slideIn 0.3s ease;
        }
        
        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
        
        .success-message {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #48bb78;
            color: white;
            padding: 15px 25px;
            border-radius: 8px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
            z-index: 9999;
            animation: slideIn 0.3s ease;
        }
        
        @media (max-width: 768px) {
            .header h1 {
                font-size: 2rem;
            }
            
            .payment-grid {
                grid-template-columns: 1fr;
            }
            
            table {
                display: block;
                overflow-x: auto;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>💰 CashCloud</h1>
            <p>Multi-User Payment Platform</p>
        </div>

        <div class="payment-grid">
            <!-- Send Payment Card -->
            <div class="payment-card">
                <h2>Send Payment</h2>
                <form id="sendPaymentForm">
                    <div class="form-group">
                        <label for="senderId">Sender ID</label>
                        <input type="text" id="senderId" placeholder="Enter sender ID" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="receiverId">Receiver ID</label>
                        <input type="text" id="receiverId" placeholder="Enter receiver ID" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="amount">Amount (CNY)</label>
                        <input type="number" id="amount" placeholder="Enter amount" min="0.01" step="0.01" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="purpose">Purpose / Notes</label>
                        <textarea id="purpose" rows="3" placeholder="Enter payment purpose"></textarea>
                    </div>
                    
                    <button type="submit" class="btn">Send Payment</button>
                </form>
            </div>

            <!-- Request Payment Card -->
            <div class="payment-card">
                <h2>Request Payment</h2>
                <form id="requestPaymentForm">
                    <div class="form-group">
                        <label for="requesterId">Your ID</label>
                        <input type="text" id="requesterId" placeholder="Enter your ID" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="requestAmount">Amount (CNY)</label>
                        <input type="number" id="requestAmount" placeholder="Enter amount" min="0.01" step="0.01" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="requestPurpose">Purpose</label>
                        <input type="text" id="requestPurpose" placeholder="Enter purpose" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="receiverEmail">Receiver Email</label>
                        <input type="email" id="receiverEmail" placeholder="Enter receiver email" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="receiverName">Receiver Name</label>
                        <input type="text" id="receiverName" placeholder="Enter receiver name" required>
                    </div>
                    
                    <button type="submit" class="btn">Generate Payment Link</button>
                </form>

                <!-- QR Code Section -->
                <div id="qrSection" class="qr-section">
                    <h3>Payment Generated!</h3>
                    <div id="qrCode" class="qr-code">
                        <span>QR Code</span>
                    </div>
                    <p>Payment Link:</p>
                    <a id="paymentLink" href="#" class="payment-link" target="_blank"></a>
                    <p style="margin-top: 10px; font-size: 0.9rem; color: #718096;">Transaction Ref: <span id="transactionRef"></span></p>
                </div>
            </div>
        </div>

        <!-- Transaction History -->
        <div class="transaction-table">
            <h2>Transaction History</h2>
            <table id="transactionTable">
                <thead>
                    <tr>
                        <th>Transaction ID</th>
                        <th>Recipient</th>
                        <th>Amount</th>
                        <th>Status</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="transactionBody">
                    <tr>
                        <td colspan="5" style="text-align: center; color: #a0aec0;">Loading transactions...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
    // Wait for the page to load
    document.addEventListener('DOMContentLoaded', function() {
        console.log('✅ Page loaded');
        
        // Initialize everything
        initializeApp();
    });

    // Main initialization function
    async function initializeApp() {
        try {
            // Check server health
            await checkServerHealth();
            
            // Load transaction history
            await loadTransactionHistory();
            
            // Setup form handlers
            setupFormHandlers();
            
        } catch (error) {
            console.error('❌ Initialization error:', error);
            showMessage('Failed to initialize application', 'error');
        }
    }

    // Check server health
    async function checkServerHealth() {
        try {
            const response = await fetch('/health');
            
            if (!response.ok) {
                throw new Error(`Server returned ${response.status}`);
            }
            
            const data = await response.json();
            console.log('✅ Server health:', data);
            
            if (data.status === 'ok') {
                showMessage('Connected to server', 'success');
                document.body.classList.add('server-connected');
            }
            
            return data;
        } catch (error) {
            console.error('❌ Server health check failed:', error);
            showMessage('Cannot connect to server. Please check your connection.', 'error');
            throw error;
        }
    }

    // Load transaction history
    async function loadTransactionHistory() {
        const tableBody = document.getElementById('transactionBody');
        
        try {
            const response = await fetch('/api/payments');
            
            if (!response.ok) {
                throw new Error(`HTTP error! status: ${response.status}`);
            }
            
            const transactions = await response.json();
            console.log('✅ Transactions loaded:', transactions);
            
            if (transactions && transactions.length > 0) {
                updateTransactionTable(transactions);
            } else {
                tableBody.innerHTML = '<tr><td colspan="5" style="text-align: center; color: #a0aec0;">No transactions found</td></tr>';
            }
            
        } catch (error) {
            console.log('ℹ️ No transactions available:', error.message);
            tableBody.innerHTML = '<tr><td colspan="5" style="text-align: center; color: #a0aec0;">No transactions available</td></tr>';
        }
    }

    // Setup form event handlers
    function setupFormHandlers() {
        // Send payment form
        const sendForm = document.getElementById('sendPaymentForm');
        if (sendForm) {
            sendForm.addEventListener('submit', handleSendPayment);
        }
        
        // Request payment form
        const requestForm = document.getElementById('requestPaymentForm');
        if (requestForm) {
            requestForm.addEventListener('submit', handleRequestPayment);
        }
    }

    // Handle send payment form submission
    async function handleSendPayment(event) {
        event.preventDefault();
        
        const formData = {
            senderId: document.getElementById('senderId').value,
            receiverId: document.getElementById('receiverId').value,
            amount: parseFloat(document.getElementById('amount').value),
            currency: 'CNY',
            purpose: document.getElementById('purpose').value || 'Payment from CashCloud'
        };
        
        try {
            showMessage('Processing payment...', 'info');
            
            const result = await createPayment(formData);
            
            if (result && result.success) {
                showMessage('Payment sent successfully!', 'success');
                event.target.reset();
                await loadTransactionHistory(); // Refresh transaction list
            } else {
                throw new Error(result?.error || 'Payment failed');
            }
            
        } catch (error) {
            console.error('❌ Payment error:', error);
            showMessage(error.message, 'error');
        }
    }

    // Handle request payment form submission
    async function handleRequestPayment(event) {
        event.preventDefault();
        
        const paymentData = {
            amount: parseFloat(document.getElementById('requestAmount').value),
            currency: 'CNY',
            purpose: document.getElementById('requestPurpose').value,
            receiverDetails: {
                email: document.getElementById('receiverEmail').value,
                name: document.getElementById('receiverName').value
            }
        };
        
        try {
            showMessage('Generating payment link...', 'info');
            
            const result = await createPaymentLink(paymentData);
            
            if (result && result.success) {
                displayPaymentResult(result);
                showMessage('Payment link generated!', 'success');
                event.target.reset();
            } else {
                throw new Error(result?.error || 'Failed to generate payment link');
            }
            
        } catch (error) {
            console.error('❌ Payment link error:', error);
            showMessage(error.message, 'error');
        }
    }

    // Create a payment
    async function createPayment(paymentData) {
        try {
            const response = await fetch('/api/payments/create', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(paymentData)
            });
            
            if (!response.ok) {
                const errorText = await response.text();
                throw new Error(errorText || `HTTP error! status: ${response.status}`);
            }
            
            const result = await response.json();
            console.log('✅ Payment created:', result);
            return result;
            
        } catch (error) {
            console.error('❌ Payment creation failed:', error);
            throw error;
        }
    }

    // Create a payment link
    async function createPaymentLink(paymentData) {
        try {
            // Add authorization token if you have one
            const token = localStorage.getItem('authToken');
            const headers = {
                'Content-Type': 'application/json'
            };
            
            if (token) {
                headers['Authorization'] = `Bearer ${token}`;
            }
            
            const response = await fetch('/api/payments/create', {
                method: 'POST',
                headers: headers,
                body: JSON.stringify({
                    ...paymentData,
                    type: 'link'
                })
            });
            
            if (!response.ok) {
                const errorText = await response.text();
                throw new Error(errorText || `HTTP error! status: ${response.status}`);
            }
            
            const result = await response.json();
            console.log('✅ Payment link created:', result);
            return result;
            
        } catch (error) {
            console.error('❌ Payment link creation failed:', error);
            throw error;
        }
    }

    // Display payment result (QR code, link)
    function displayPaymentResult(result) {
        const qrSection = document.getElementById('qrSection');
        const paymentLink = document.getElementById('paymentLink');
        const transactionRef = document.getElementById('transactionRef');
        
        if (qrSection) {
            qrSection.classList.add('show');
            
            if (result.payment_link) {
                paymentLink.href = result.payment_link;
                paymentLink.textContent = result.payment_link;
            }
            
            if (result.transaction_ref) {
                transactionRef.textContent = result.transaction_ref;
            }
            
            // Simulate QR code (you'd generate a real one here)
            const qrCode = document.getElementById('qrCode');
            if (qrCode) {
                qrCode.innerHTML = '<span>🔳 QR Code Ready</span>';
            }
        }
    }

    // Update transaction table
    function updateTransactionTable(transactions) {
        const tableBody = document.getElementById('transactionBody');
        if (!tableBody) return;
        
        tableBody.innerHTML = '';
        
        transactions.forEach(tx => {
            const row = tableBody.insertRow();
            
            // Transaction ID
            const idCell = row.insertCell(0);
            idCell.textContent = tx._id || tx.id || 'N/A';
            
            // Recipient
            const recipientCell = row.insertCell(1);
            recipientCell.textContent = tx.receiverDetails?.name || tx.recipient || 'N/A';
            
            // Amount
            const amountCell = row.insertCell(2);
            amountCell.textContent = `¥${tx.amount || 0}`;
            
            // Status
            const statusCell = row.insertCell(3);
            const status = tx.status || 'pending';
            const statusSpan = document.createElement('span');
            statusSpan.className = `status-badge status-${status}`;
            statusSpan.textContent = status.charAt(0).toUpperCase() + status.slice(1);
            statusCell.appendChild(statusSpan);
            
            // Action
            const actionCell = row.insertCell(4);
            const viewBtn = document.createElement('button');
            viewBtn.textContent = 'View';
            viewBtn.style.cssText = `
                background: #667eea;
                color: white;
                border: none;
                padding: 5px 15px;
                border-radius: 5px;
                cursor: pointer;
                font-size: 0.875rem;
            `;
            viewBtn.onclick = () => viewTransaction(tx._id || tx.id);
            actionCell.appendChild(viewBtn);
        });
    }

    // View transaction details
    function viewTransaction(transactionId) {
        if (!transactionId) {
            showMessage('Invalid transaction ID', 'error');
            return;
        }
        
        console.log('Viewing transaction:', transactionId);
        showMessage(`Viewing transaction: ${transactionId}`, 'info');
        // Add your view logic here - maybe open a modal or navigate to details page
    }

    // Show message to user
    function showMessage(message, type = 'info') {
        // Remove any existing messages
        const existingMessages = document.querySelectorAll('.error-message, .success-message');
        existingMessages.forEach(msg => msg.remove());
        
        const messageDiv = document.createElement('div');
        messageDiv.className = type === 'error' ? 'error-message' : 'success-message';
        messageDiv.textContent = message;
        
        document.body.appendChild(messageDiv);
        
        // Auto remove after 5 seconds
        setTimeout(() => {
            if (messageDiv.parentNode) {
                messageDiv.remove();
            }
        }, 5000);
        
        // Also log to console
        if (type === 'error') {
            console.error('❌', message);
        } else if (type === 'success') {
            console.log('✅', message);
        } else {
            console.log('ℹ️', message);
        }
    }

    // Make functions available globally if needed
    window.viewTransaction = viewTransaction;
    window.showMessage = showMessage;
    </script>
</body>
</html>
